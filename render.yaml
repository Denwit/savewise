services:
  - type: web
    name: savewise-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: postgres
      - key: DB_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: APP_NAME
        value: SaveWise
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: NO_REPLY_EMAIL
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: savewise-db
          property: connectionString

databases:
  - name: savewise-db
    plan: free
    databaseName: savewise
    user: savewise
